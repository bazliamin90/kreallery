<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kreallery</title>

<style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  font-family: monospace, sans-serif;
  background: #f5f5f5;
}

body.no-scroll {
  overflow: hidden; /* 🔥 disable scroll */
}

h1 {
  text-align: center;
  font-size: 20px;
  margin: 10px 0;
}

/* SEARCH */
#searchWrap {
  position: sticky;
  top: 0;
  width: 90%;
  margin: 0 auto 10px;
  display: flex;
  gap: 5px;
}

#searchBox {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 0.7rem;
  font-family: monospace;
  font-style: italic;
}

.btn {
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: #333;
  color: white;
  font-size: 0.7rem;
  font-family: monospace;
  cursor: pointer;
}

/* GRID */
#albums, #gallery {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  width: 90%;
  margin: 0 auto;
}

@media (min-width: 600px) {
  #albums, #gallery {
    grid-template-columns: repeat(3, 1fr);
  }
}

.card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  text-align: center;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: contain;
  background: #eee;
}

.title {
  font-size: 13px;
  padding: 6px;
  font-weight: bold;
}

.filename {
  font-size: 11px;
  color: #555;
  padding: 0 5px 8px;
  word-break: break-word;
}

#back {
  display: none;
  padding: 10px;
  background: #fff;
  border-bottom: 1px solid #ddd;
  width: 90%;
  margin: 0 auto 10px;
  border-radius: 12px;
  text-align: center;
}



/* LIGHTBOX */
#lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: none;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

#lightbox img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  cursor: grab;
  user-select: none;
}

/* CLOSE */
#closeBtn {
  position: absolute;
  top: 15px;
  right: 20px;
  color: white;
  background: #555;
  border-radius: 5px;
  padding: 5px 10px;
  cursor: pointer;
}

/* NAV */
#prevBtn, #nextBtn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 30px;
  color: white;
  background: #555;
  box-shadow: 0 2px 5px rgba(0,0,0,0.5);
  opacity: 0.2;
  padding: 10px;
  cursor: pointer;
  z-index: 10;
}

#prevBtn { left: 10px; }
#nextBtn { right: 10px; }

/* ZOOM BUTTONS (ON TOP) */
#zoomControls {
  position: absolute;
  top: 20px;
  left: 20px;
  display: flex;
  gap: 10px;
  z-index: 10;
}

.zoomBtn {
  background: rgba(0,0,0,0.6);
  color: white;
  border-radius: 50%;
  cursor: pointer;
  background: #555;
  border-radius: 5px;
  padding: 5px 10px;
}

/* BOTTOM SHEET */
#sheet {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: #111;
  color: white;
  text-align: center;
  padding: 10px;
}
</style>
</head>

<body>

<h1 onclick="goHome()">Kreatif Gallery</h1>

<div id="searchWrap">
  <input id="searchBox" placeholder="cari gambar (tahun)...">
  <button class="btn" onclick="doSearch()">go</button>
  <button class="btn" onclick="resetSearch()">reset</button>
</div>

<div id="back" onclick="goHome()">⬅ Back</div>

<div id="albums"></div>
<div id="gallery" style="display:none;"></div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <div id="closeBtn" onclick="closeLightbox()">✕</div>
  <div id="prevBtn">❮</div>
  <div id="nextBtn">❯</div>

  <div id="zoomControls">
    <div class="zoomBtn" onclick="zoomIn()">＋</div>
    <div class="zoomBtn" onclick="zoomOut()">－</div>
  </div>

  <img id="lightboxImg">
  <div id="sheet"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzOqHNqoct7B3rQkzEZ4L1wjodpEc9qxLSYWz0xJjSNysoneRJwHZEkfuqKBG8Ns9zf/exec";

let allAlbums = [];
let currentAlbum = null;
let currentImages = [];
let currentIndex = 0;

let scale = 1;
let startX = 0;
let startY = 0;
let currentX = 0;
let currentY = 0;
let isDragging = false;

/* LOAD */
async function load() {
  const res = await fetch(API_URL);
  allAlbums = await res.json();
  renderAlbums(allAlbums);
}

/* HOME */
function goHome() {
  currentAlbum = null;
  renderAlbums(allAlbums);
  document.getElementById("albums").style.display = "grid";
  document.getElementById("gallery").style.display = "none";
  document.getElementById("back").style.display = "none";
}

/* RENDER */
function renderAlbums(albums) {
  const el = document.getElementById("albums");
  el.innerHTML = "";

  albums.forEach(album => {
    const card = document.createElement("div");
    card.className = "card";

    const cover = album.images[0]?.thumb || "";

    card.innerHTML = `<img src="${cover}"><div class="title">${album.name}</div>`;
    card.onclick = () => openAlbum(album);
    el.appendChild(card);
  });
}

function openAlbum(album) {
  currentAlbum = album;
  document.getElementById("albums").style.display = "none";
  document.getElementById("gallery").style.display = "grid";
  document.getElementById("back").style.display = "block";
  renderImages(album.images);
}

function renderImages(images) {
  currentImages = images;
  const el = document.getElementById("gallery");
  el.innerHTML = "";

  images.forEach((img, index) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `<img src="${img.thumb}"><div class="filename">${img.name}</div>`;
    card.onclick = () => openLightbox(index);
    el.appendChild(card);
  });
}

/* SEARCH */
function doSearch() {
  const q = document.getElementById("searchBox").value.toLowerCase();

  if (currentAlbum) {
    renderImages(currentAlbum.images.filter(i =>
      i.name.toLowerCase().includes(q)
    ));
  } else {
    renderAlbums(allAlbums.filter(a =>
      a.name.toLowerCase().includes(q) ||
      a.images.some(i => i.name.toLowerCase().includes(q))
    ));
  }
}

function resetSearch() {
  document.getElementById("searchBox").value = "";
  goHome();
}

/* LIGHTBOX */
const lightbox = document.getElementById("lightbox");
const imgEl = document.getElementById("lightboxImg");

function openLightbox(index) {
  currentIndex = index;
  showImage();
  lightbox.style.display = "flex";
  document.body.classList.add("no-scroll"); /* 🔥 disable scroll */
}

function closeLightbox() {
  lightbox.style.display = "none";
  document.body.classList.remove("no-scroll"); /* 🔥 enable scroll */
}

function showImage() {
  const img = currentImages[currentIndex];

  scale = 1;
  currentX = 0;
  currentY = 0;

  updateTransform();
  imgEl.src = img.full;
  document.getElementById("sheet").innerText = img.name;
}

/* ZOOM */
function zoomIn() {
  scale = Math.min(scale + 0.5, 4);
  updateTransform();
}

function zoomOut() {
  scale = Math.max(scale - 0.5, 1);
  if (scale === 1) {
    currentX = 0;
    currentY = 0;
  }
  updateTransform();
}

/* 🔥 BOUNDED PAN */
function updateTransform() {
  const rect = imgEl.getBoundingClientRect();

  const maxX = (rect.width * (scale - 1)) / 2;
  const maxY = (rect.height * (scale - 1)) / 2;

  currentX = Math.max(-maxX, Math.min(maxX, currentX));
  currentY = Math.max(-maxY, Math.min(maxY, currentY));

  imgEl.style.transform =
    `translate(${currentX}px, ${currentY}px) scale(${scale})`;
}

/* MOUSE PAN */
imgEl.addEventListener("mousedown", e => {
  if (scale === 1) return;
  isDragging = true;
  startX = e.clientX;
  startY = e.clientY;
  imgEl.style.cursor = "grabbing";
});

window.addEventListener("mousemove", e => {
  if (!isDragging) return;

  currentX += e.clientX - startX;
  currentY += e.clientY - startY;

  updateTransform();

  startX = e.clientX;
  startY = e.clientY;
});

window.addEventListener("mouseup", () => {
  isDragging = false;
  imgEl.style.cursor = "grab";
});

/* TOUCH PAN */
imgEl.addEventListener("touchstart", e => {
  if (scale === 1) return;
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
  isDragging = true;
});

imgEl.addEventListener("touchmove", e => {
  if (!isDragging) return;

  currentX += e.touches[0].clientX - startX;
  currentY += e.touches[0].clientY - startY;

  updateTransform();

  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
});

imgEl.addEventListener("touchend", () => {
  isDragging = false;
});

/* NAV */
document.getElementById("prevBtn").onclick = () => {
  if (currentIndex > 0) {
    currentIndex--;
    showImage();
  }
};

document.getElementById("nextBtn").onclick = () => {
  if (currentIndex < currentImages.length - 1) {
    currentIndex++;
    showImage();
  }
};

load();
</script>

</body>
</html>
