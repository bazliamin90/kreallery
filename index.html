<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kreallery</title>

<style>

/* RESET */
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  font-family: monospace, sans-serif;
  background: #f5f5f5;
}

/* HEADER */
h1 {
  text-align: center;
  font-size: 20px;
  margin: 10px 0;
}

/* SEARCH */
#searchBox {
  position: sticky;
  top: 0;
  width: 90%;
  display: flex;
  margin: 0 auto 10px;
  padding: 12px;
  border: none;
  border-radius: 12px;
  border-bottom: 1px solid #ddd;
  font-size: 0.875rem;
  font-family: monospace, sans-serif;
  font-style: italic;
}

/* GRID */
#albums, #gallery {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  width: 90%;
  margin: 0 auto;
}

@media (min-width: 600px) {
  #albums, #gallery {
    grid-template-columns: repeat(3, 1fr);
  }
}

/* CARD */
.card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  text-align: center;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

/* IMAGE */
.card img {
  width: 100%;
  height: 120px;
  object-fit: contain;
  background: #eee;
}

/* TEXT */
.title {
  font-size: 13px;
  padding: 6px;
  font-weight: bold;
}

.filename {
  font-size: 11px;
  color: #555;
  padding: 0 5px 8px;
  word-break: break-word;
}

/* BACK */
#back {
  display: none;
  padding: 10px;
  background: #fff;
  border-bottom: 1px solid #ddd;
  width: 90%;
  margin: 0 auto 10px;
  border-radius: 12px;
  text-align: center;
  font-size: 0.875rem;
}

/* LIGHTBOX */
#lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: none;
  justify-content: center;
  align-items: center;
}

/* IMAGE */
#lightbox img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  touch-action: none; /* 🔥 required for gestures */
}

/* CLOSE BUTTON */
#closeBtn {
  position: absolute;
  top: 15px;
  right: 20px;
  color: white;
  background-color: #555;
  border-radius: 5px;
  padding: 5px 10px;
  font-size: 1rem;
  z-index: 10;
  cursor: pointer;
}

#prevBtn, #nextBtn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 30px;
  color: white;
  background-color: #555;
  opacity: 0.2;
  padding: 10px;
  cursor: pointer;
  user-select: none;
  z-index: 10;
  box-shadow: 0 2px 5px rgba(0,0,0,0.4);
}

#prevBtn { left: 10px; }
#nextBtn { right: 10px; }

/* BOTTOM SHEET */
#sheet {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: #111;
  color: white;
  text-align: center;
  padding: 10px;
}

</style>
</head>

<body>

<h1 onclick="goHome()">Kreatif Gallery</h1>

<input id="searchBox" placeholder="cari gambar (tahun)...">

<div id="back">⬅ Back</div>

<div id="albums"></div>
<div id="gallery" style="display:none;"></div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <div id="closeBtn" onclick="closeLightbox()">✕</div>
  <div id="prevBtn">❮</div>
  <div id="nextBtn">❯</div>
  <img id="lightboxImg">
  <div id="sheet"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzOqHNqoct7B3rQkzEZ4L1wjodpEc9qxLSYWz0xJjSNysoneRJwHZEkfuqKBG8Ns9zf/exec";

let allAlbums = [];
let currentAlbum = null;
let currentImages = [];
let currentIndex = 0;

/* ================= LOAD ================= */
async function load() {
  const res = await fetch(API_URL);
  allAlbums = await res.json();
  renderAlbums(allAlbums);
}

/* ================= HOME ================= */
function goHome() {
  currentAlbum = null;
  document.getElementById("albums").style.display = "grid";
  document.getElementById("gallery").style.display = "none";
  document.getElementById("back").style.display = "none";
}

/* ================= ALBUMS ================= */
function renderAlbums(albums) {
  const el = document.getElementById("albums");
  el.innerHTML = "";

  albums.forEach(album => {
    const card = document.createElement("div");
    card.className = "card";

    const cover = album.images[0]?.thumb || "";

    card.innerHTML = `
      <img src="${cover}">
      <div class="title">${album.name}</div>
    `;

    card.onclick = () => openAlbum(album);
    el.appendChild(card);
  });
}

/* ================= OPEN ALBUM ================= */
function openAlbum(album) {
  currentAlbum = album;

  document.getElementById("albums").style.display = "none";
  document.getElementById("gallery").style.display = "grid";
  document.getElementById("back").style.display = "block";

  renderImages(album.images);
}

/* ================= IMAGES ================= */
function renderImages(images) {
  currentImages = images;

  const el = document.getElementById("gallery");
  el.innerHTML = "";

  images.forEach((img, index) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${img.thumb}">
      <div class="filename">${img.name}</div>
    `;

    card.onclick = () => openLightbox(index);
    el.appendChild(card);
  });
}

/* ================= BACK ================= */
document.getElementById("back").onclick = () => goHome();

/* ================= SEARCH ================= */
document.getElementById("searchBox").addEventListener("input", function() {
  const q = this.value.toLowerCase();

  if (currentAlbum) {
    renderImages(currentAlbum.images.filter(i =>
      i.name.toLowerCase().includes(q)
    ));
  } else {
    renderAlbums(allAlbums.filter(a =>
      a.name.toLowerCase().includes(q) ||
      a.images.some(i => i.name.toLowerCase().includes(q))
    ));
  }
});

/* ================= LIGHTBOX ================= */
const lightbox = document.getElementById("lightbox");
const imgEl = document.getElementById("lightboxImg");

let scale = 1;
let startX = 0;
let startY = 0;
let currentX = 0;
let currentY = 0;
let isDragging = false;
let lastTap = 0;

function openLightbox(index) {
  currentIndex = index;
  showImage();
  lightbox.style.display = "flex";
}

function closeLightbox() {
  lightbox.style.display = "none";
}

function showImage() {
  const img = currentImages[currentIndex];

  scale = 1;
  currentX = 0;
  currentY = 0;

  imgEl.style.transform = "translate(0px,0px) scale(1)";
  imgEl.src = img.full;

  document.getElementById("sheet").innerText = img.name;
}

/* CLOSE when clicking background */
lightbox.addEventListener("click", (e) => {
  if (e.target.id === "lightbox") {
    closeLightbox();
  }
});

document.getElementById("prevBtn").onclick = () => {
  if (currentIndex > 0) {
    currentIndex--;
    showImage();
  }
};

document.getElementById("nextBtn").onclick = () => {
  if (currentIndex < currentImages.length - 1) {
    currentIndex++;
    showImage();
  }
};

/* ================= TOUCH START ================= */
lightbox.addEventListener("touchstart", e => {
  if (e.touches.length === 1) {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isDragging = true;
  }
});

/* ================= TOUCH MOVE ================= */
lightbox.addEventListener("touchmove", e => {
  if (!isDragging) return;

  let x = e.touches[0].clientX;
  let y = e.touches[0].clientY;

  let dx = x - startX;
  let dy = y - startY;

  /* PAN when zoomed */
  if (scale > 1) {
    e.preventDefault();

    currentX += dx;
    currentY += dy;

    imgEl.style.transform =
      `translate(${currentX}px, ${currentY}px) scale(${scale})`;

    startX = x;
    startY = y;
  }
});

/* ================= TOUCH END ================= */
lightbox.addEventListener("touchend", e => {
  if (!isDragging) return;

  let endX = e.changedTouches[0].clientX;
  let diff = startX - endX;

  /* SWIPE only when not zoomed */
  if (scale === 1 && Math.abs(diff) > 50) {
    if (diff > 0 && currentIndex < currentImages.length - 1) {
      currentIndex++;
    } else if (diff < 0 && currentIndex > 0) {
      currentIndex--;
    }
    showImage();
  }

  isDragging = false;

  /* DOUBLE TAP */
  let now = new Date().getTime();
  let gap = now - lastTap;

  if (gap < 300 && gap > 0) {
    if (scale === 1) {
      scale = 2;
    } else {
      scale = 1;
      currentX = 0;
      currentY = 0;
    }

    imgEl.style.transform =
      `translate(${currentX}px, ${currentY}px) scale(${scale})`;
  }

  lastTap = now;
});

/* ================= WHEEL ZOOM ================= */
imgEl.addEventListener("wheel", e => {
  e.preventDefault();

  scale += e.deltaY * -0.001;
  scale = Math.min(Math.max(1, scale), 4);

  imgEl.style.transform =
    `translate(${currentX}px, ${currentY}px) scale(${scale})`;
});

/* ================= KEYBOARD NAVIGATION ================= */
document.addEventListener("keydown", (e) => {
  // only work when lightbox is open
  if (lightbox.style.display !== "flex") return;

  if (e.key === "ArrowRight") {
    if (currentIndex < currentImages.length - 1) {
      currentIndex++;
      showImage();
    }
  }

  if (e.key === "ArrowLeft") {
    if (currentIndex > 0) {
      currentIndex--;
      showImage();
    }
  }

  if (e.key === "Escape") {
    closeLightbox();
  }
});

/* ================= START ================= */
load();
</script>

</body>
</html>
